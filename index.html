<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meshtastic Log Analyser</title>
  <style>
    :root {
      --bg:       #111827;
      --surface:  #1f2937;
      --surface2: #374151;
      --border:   #374151;
      --green:    #67EA94;
      --green-bg: rgba(103,234,148,0.12);
      --text:     #f3f4f6;
      --muted:    #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-bottom: 28px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .title { font-weight: 700; color: var(--green); letter-spacing: 0.01em; }
    .title-sub { color: var(--muted); }
    .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* View tabs (Live Serial / File) + control groups */
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-group[hidden] { display: none; }
    .view-tab {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 5px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }

    /* Status dot */
    #statusDot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    #statusDot.connected {
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

    /* ── Advanced panel ── */
    #advanced {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }

    /* ── Port bar ── */
    .port-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
    }
    .port-bar-label { color: var(--muted); font-weight: 600; letter-spacing: 0.05em; margin-right: 2px; flex-shrink: 0; }
    #port_chips { display: flex; align-items: center; gap: 6px; flex: 1; overflow-x: auto; }
    .port-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .port-chip::before { content: '●'; font-size: 7px; }
    .port-chip.port-connected { color: var(--green); }
    .port-chip.port-connected::before { color: var(--green); }
    .port-gone-count {
      color: var(--muted);
      font-size: 10px;
      opacity: 0.55;
      padding: 2px 6px;
      background: var(--surface2);
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: default;
    }

    /* ── Workspace: terminal + info sidebar ── */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Terminal wrapper — size is stable; info panel is a sibling, not a flex child */
    .term-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      position: relative;
    }
    .term-wrap[hidden] { display: none; }
    #terminal_serial, #terminal_file { width: 100%; height: 100%; }

    /* ── Log gutter annotations ── */
    .log-gutter {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      cursor: help;
      pointer-events: auto;
      user-select: none;
      z-index: 20;
    }
    .gutter-fault { filter: drop-shadow(0 0 2px rgba(239, 68, 68, 0.7)); }
    .line-tip {
      position: fixed;
      max-width: 320px;
      background: #1f2937;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      line-height: 1.5;
      padding: 5px 9px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 1000;
    }
    .line-tip.visible { opacity: 1; }
    .line-flash {
      background: rgba(103, 234, 148, 0.18);
      animation: flashfade 1.2s ease-out;
      pointer-events: none;
    }
    @keyframes flashfade { 0% { background: rgba(103, 234, 148, 0.35); } 100% { background: rgba(103, 234, 148, 0); } }

    /* ── Lines of Interest tab ── */
    #interestContent { display: flex; flex-direction: column; gap: 0; }
    .int-empty { color: var(--muted); font-size: 11px; padding: 4px 0; }
    .int-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      border-left: 2px solid transparent;
    }
    .int-row:hover { background: var(--surface2); border-left-color: var(--green); }
    .int-title { font-size: 11px; font-weight: 600; color: var(--text); }
    .int-snip {
      font-family: monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .int-hidden {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 4px;
      margin-left: 4px;
    }
    .int-pulse { animation: intpulse 1.2s ease-out; }
    @keyframes intpulse {
      0% { background: var(--green-bg); }
      100% { background: transparent; }
    }

    /* Drop overlay */
    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .drop-overlay.active { opacity: 1; pointer-events: auto; }
    .drop-hint {
      border: 2px dashed var(--green);
      border-radius: 8px;
      padding: 24px 44px;
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ── Info sidebar ── */
    #info_panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      min-height: 0;
    }
    #info_panel[hidden] { display: none; }

    .info-header {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-tab {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 3px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .info-tab.active { background: var(--green-bg); color: var(--green); }
    .info-tab:not(.active):hover { color: var(--text); }
    .info-tab-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      margin-left: 3px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .info-tab-dot.visible { opacity: 1; }
    .all-boots-label {
      margin-left: auto;
      color: var(--muted);
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .all-boots-label:hover { color: var(--text); }
    .all-boots-label input { cursor: pointer; accent-color: var(--green); }
    #info_close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      margin-left: 4px;
      border-radius: 3px;
    }
    #info_close:hover { color: var(--text); }

    .info-body {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .info-pane { padding: 10px 12px; }
    .info-pane[hidden] { display: none; }

    /* ── Common controls ── */
    label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }

    select, input[type="number"], input[type="text"] {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }

    .btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--green); background: var(--green-bg); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #connect {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green);
      font-weight: 600;
    }
    #connect:hover { background: var(--green); color: #111827; }

    .btn-active {
      background: var(--green-bg) !important;
      color: var(--green) !important;
      border-color: var(--green) !important;
    }

    /* Level filter buttons */
    .level-btn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }
    .level-btn[data-level="D"].active { background: rgba(6,182,212,0.15);   color: #06b6d4; border-color: #06b6d4; }
    .level-btn[data-level="I"].active { background: rgba(103,234,148,0.15); color: #67EA94; border-color: #67EA94; }
    .level-btn[data-level="W"].active { background: rgba(245,158,11,0.15);  color: #f59e0b; border-color: #f59e0b; }
    .level-btn[data-level="E"].active { background: rgba(239,68,68,0.15);   color: #ef4444; border-color: #ef4444; }
    .level-btn[data-level="C"].active { background: rgba(220,38,38,0.2);    color: #dc2626; border-color: #dc2626; }

    .module-buttons { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .module-btn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }
    .module-btn.active { background: rgba(167,139,250,0.15); color: #a78bfa; border-color: #a78bfa; }
    #polyfill_switcher { color: var(--muted); font-size: 11px; text-decoration: none; }
    #polyfill_switcher:hover { color: var(--text); }
    .pii-eg { font-size: 10px; color: var(--muted); font-weight: 400; }

    /* ── Summary content (inside info sidebar) ── */
    [data-tooltip] { position: relative; cursor: help; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 3px);
      left: 0;
      background: #1f2937;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      font-style: normal;
      font-weight: 400;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 280px;
      white-space: normal;
      line-height: 1.5;
    }
    [data-tooltip]:hover::after { opacity: 1; }
    #summaryContent {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .device-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin: 4px auto 10px;
      display: block;
      filter: drop-shadow(0 0 6px rgba(103,234,148,0.2));
      opacity: 0.9;
    }
    .sum-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .sum-row {
      display: flex;
      gap: 8px;
      font-size: 11px;
      line-height: 1.65;
      min-width: 0;
      padding: 1px 0;
    }
    .sum-label {
      color: var(--muted);
      flex-shrink: 0;
      width: 76px;
      text-align: right;
      font-size: 10px;
      padding-top: 1px;
    }
    .sum-value { color: var(--text); min-width: 0; word-break: break-word; }
    .sum-value code {
      font-family: monospace;
      font-size: 10px;
      background: var(--surface2);
      padding: 1px 4px;
      border-radius: 3px;
    }
    .sum-tag {
      font-size: 10px;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(103,234,148,0.3);
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 600;
    }
    .sum-warn { color: #f59e0b; font-weight: 600; }
    .sum-err  { color: #ef4444; font-weight: 600; }
    .sum-divider {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .sum-divider-err { color: #f87171; border-color: rgba(239,68,68,0.3); }

    /* ── Hop chart content ── */
    #hopChartContent {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .hc-section { display: flex; flex-direction: column; gap: 4px; }
    .hc-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .hc-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
    }
    .hc-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
      gap: 4px;
      z-index: 10;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- ── Main toolbar ── -->
  <div class="toolbar">
    <div id="statusDot"></div>
    <span class="title">Meshtastic</span>
    <span class="title-sub">Log Analyser</span>
    <div class="sep"></div>
    <button class="view-tab active" data-view="serial">● Live Serial</button>
    <button class="view-tab" data-view="file">📄 File</button>
    <div class="sep"></div>
    <span id="serial_controls" class="ctrl-group">
      <label for="ports">Port</label>
      <select id="ports">
        <option value="prompt">— select port —</option>
      </select>
      <button id="connect" class="btn">Connect</button>
      <div class="sep"></div>
      <label for="baudrate">Baud</label>
      <select id="baudrate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
        <option value="custom">Custom…</option>
      </select>
      <input id="custom_baudrate" type="number" min="1" placeholder="baud…" hidden style="width:90px">
      <button id="advanced_toggle" class="btn" style="font-size:11px">Advanced ▾</button>
    </span>
    <span id="file_controls" class="ctrl-group" hidden>
      <button id="load_file_btn" class="btn">📂 Load file…</button>
      <span id="file_name" class="title-sub"></span>
      <input id="file_input" type="file" hidden>
    </span>
    <div class="toolbar-right">
      <a id="polyfill_switcher"></a>
    </div>
  </div>

  <!-- ── Advanced serial settings (hidden by default) ── -->
  <div id="advanced" hidden>
    <label for="databits">Data bits
      <select id="databits">
        <option value="7">7</option>
        <option value="8" selected>8</option>
      </select>
    </label>
    <label for="parity">Parity
      <select id="parity">
        <option value="none" selected>None</option>
        <option value="even">Even</option>
        <option value="odd">Odd</option>
      </select>
    </label>
    <label for="stopbits">Stop bits
      <select id="stopbits">
        <option value="1" selected>1</option>
        <option value="2">2</option>
      </select>
    </label>
    <label><input id="rtscts" type="checkbox"> HW flow control</label>
    <label><input id="reconnect" type="checkbox" checked> Reconnect to device</label>
    <label><input id="grab_next" type="checkbox"> Grab next available</label>
  </div>

  <!-- ── Port history bar (auto-shown when ports are seen) ── -->
  <div class="port-bar" id="port_bar" hidden>
    <span class="port-bar-label">PORTS</span>
    <div id="port_chips"></div>
  </div>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <span class="filter-label">LEVEL</span>
    <button class="level-btn active" data-level="D">DBG</button>
    <button class="level-btn active" data-level="I">INF</button>
    <button class="level-btn active" data-level="W">WRN</button>
    <button class="level-btn active" data-level="E">ERR</button>
    <button class="level-btn active" data-level="C">CRT</button>
    <div class="sep"></div>
    <span class="filter-label">MODULE</span>
    <button id="module_all_none" class="module-btn active" title="Select all / none">±</button>
    <div id="module_buttons" class="module-buttons"></div>
    <div class="sep"></div>
    <button id="pii_toggle" class="btn" title="Redact node IDs, GPS coords and node names">🔒 PII: OFF <span class="pii-eg">lat=52.944 lon=-1.435</span></button>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button id="save"  class="btn">⬇ Save</button>
      <button id="clear" class="btn">⬜ Clear</button>
    </div>
  </div>

  <!-- ── Workspace: terminal + info sidebar (side by side, terminal never resizes vertically) ── -->
  <div class="workspace">

    <!-- Drop zone overlays the whole workspace -->
    <div class="drop-overlay" id="drop_overlay">
      <div class="drop-hint">Drop log file to analyze</div>
    </div>

    <!-- Live serial terminal -->
    <div class="term-wrap" id="view_serial">
      <div id="terminal_serial"></div>
    </div>

    <!-- File analysis terminal (own session, no serial controls) -->
    <div class="term-wrap" id="view_file" hidden>
      <div id="terminal_file"></div>
    </div>

    <!-- Info sidebar: shown once summary/hop data is extracted -->
    <div id="info_panel" hidden>
      <div class="info-header">
        <button class="info-tab active" data-panel="summary">SUMMARY</button>
        <button class="info-tab" data-panel="interest">INTEREST <span class="info-tab-dot" id="interest_dot"></span></button>
        <button class="info-tab" data-panel="hops">HOPS <span class="info-tab-dot" id="hops_dot"></span></button>
        <label class="all-boots-label" title="Show accumulated counts across all boots in this log">
          <input id="all_boots" type="checkbox"> all boots
        </label>
        <button id="info_close" title="Close panel">✕</button>
      </div>
      <div class="info-body">
        <div id="panel_summary" class="info-pane">
          <div id="summaryContent"></div>
        </div>
        <div id="panel_interest" class="info-pane" hidden>
          <div id="interestContent"></div>
        </div>
        <div id="panel_hops" class="info-pane" hidden>
          <div id="hopChartContent"></div>
        </div>
      </div>
    </div>

  </div>

  <footer>
    Based on the <a href="https://github.com/meshtastic/firmware" target="_blank" rel="noopener">Meshtastic</a>
    source code &amp; <a href="https://github.com/GoogleChromeLabs/serial-terminal" target="_blank"
    rel="noopener">GoogleChromeLabs/serial-terminal</a>. Shared under the
    <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener">GPL-3.0 licence</a>.
  </footer>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
