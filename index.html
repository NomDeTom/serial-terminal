<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meshtastic Log Analyser</title>
  <style>
    :root {
      --bg:       #111827;
      --surface:  #1f2937;
      --surface2: #374151;
      --border:   #374151;
      --green:    #67EA94;
      --green-bg: rgba(103,234,148,0.12);
      --text:     #f3f4f6;
      --muted:    #6b7280;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-bottom: 28px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .title { font-weight: 700; color: var(--green); letter-spacing: 0.01em; }
    .title-sub { color: var(--muted); }
    .sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* View tabs (Live Serial / File) + control groups */
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-group[hidden] { display: none; }
    #serial_controls { flex: 1; flex-wrap: wrap; row-gap: 6px; }
    .view-tab {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 5px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .view-tab:hover { color: var(--text); }
    .view-tab.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }
    .view-tab-big {
      font-size: 15px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 7px;
      border-width: 1px;
    }

    /* ── Row 2: mode bar (serial / file controls) ── */
    .mode-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .api-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .api-label { letter-spacing: 0.02em; }
    #api_current { color: var(--green); font-weight: 700; }
    #polyfill_switcher { font-size: 11px; text-decoration: none; padding: 3px 8px; }

    /* File load progress */
    .file-progress { display: flex; align-items: center; gap: 6px; }
    .file-progress[hidden] { display: none; }
    .file-progress-bar {
      width: 120px;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    #file_progress_fill {
      display: block;
      height: 100%;
      width: 0;
      background: var(--green);
      transition: width 0.1s linear;
    }
    #file_progress_pct { font-size: 11px; color: var(--muted); min-width: 30px; }

    /* Status dot */
    #statusDot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    #statusDot.connected {
      background: var(--green);
      box-shadow: 0 0 7px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .filter-label { color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; }

    /* ── Port bar ── */
    .port-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
    }
    .port-bar-label { color: var(--muted); font-weight: 600; letter-spacing: 0.05em; margin-right: 2px; flex-shrink: 0; }
    #port_chips { display: flex; align-items: center; gap: 6px; flex: 1; overflow-x: auto; }
    .port-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.12s, color 0.12s;
    }
    .port-chip:hover { border-color: var(--green); color: var(--text); }
    .port-chip::before { content: '●'; font-size: 7px; }
    .port-chip.port-connected { color: var(--green); }
    .port-chip.port-connected::before { color: var(--green); }
    .port-gone-count {
      color: var(--muted);
      font-size: 10px;
      opacity: 0.55;
      padding: 2px 6px;
      background: var(--surface2);
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: default;
    }

    /* ── Workspace: terminal + info sidebar ── */
    .workspace {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    /* Terminal wrapper — size is stable; info panel is a sibling, not a flex child */
    .term-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      position: relative;
    }
    .term-wrap[hidden] { display: none; }
    #terminal_serial, #terminal_file { width: 100%; height: 100%; }

    /* Always-on terminal scrollbar so it's obvious the log can scroll */
    .xterm-viewport { overflow-y: scroll !important; }
    .xterm-viewport::-webkit-scrollbar { width: 12px; }
    .xterm-viewport::-webkit-scrollbar-track { background: var(--bg); }
    .xterm-viewport::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 6px;
      border: 2px solid var(--bg);
    }
    .xterm-viewport::-webkit-scrollbar-thumb:hover { background: #4b5563; }

    /* ── Log gutter annotations ── */
    .log-gutter {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
      cursor: help;
      pointer-events: auto;
      user-select: none;
      z-index: 20;
    }
    .gutter-fault { filter: drop-shadow(0 0 2px rgba(239, 68, 68, 0.7)); }
    .line-tip {
      position: fixed;
      max-width: 320px;
      background: #1f2937;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      line-height: 1.5;
      padding: 5px 9px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 1000;
    }
    .line-tip.visible { opacity: 1; }
    .line-flash {
      background: rgba(103, 234, 148, 0.18);
      animation: flashfade 1.2s ease-out;
      pointer-events: none;
    }
    @keyframes flashfade { 0% { background: rgba(103, 234, 148, 0.35); } 100% { background: rgba(103, 234, 148, 0); } }

    /* ── Lines of Interest tab ── */
    #interestContent { display: flex; flex-direction: column; gap: 0; }
    .int-empty { color: var(--muted); font-size: 11px; padding: 4px 0; }
    .int-row {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      border-left: 2px solid transparent;
    }
    .int-row:hover { background: var(--surface2); border-left-color: var(--green); }
    .int-title { font-size: 11px; font-weight: 600; color: var(--text); }
    .int-snip {
      font-family: monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .int-hidden {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 4px;
      margin-left: 4px;
    }
    .int-pulse { animation: intpulse 1.2s ease-out; }
    @keyframes intpulse {
      0% { background: var(--green-bg); }
      100% { background: transparent; }
    }

    /* Drop overlay */
    .drop-overlay {
      position: absolute;
      inset: 0;
      background: rgba(17, 24, 39, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .drop-overlay.active { opacity: 1; pointer-events: auto; }
    .drop-hint {
      border: 2px dashed var(--green);
      border-radius: 8px;
      padding: 24px 44px;
      color: var(--green);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* ── Info sidebar ── */
    #info_panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      min-height: 0;
      position: relative;
      padding: 0 22px;   /* room for the left + right control strips */
    }
    #info_panel[hidden] { display: none; }

    /* Edge control strips (full-height clickable bars on each side) */
    .panel-edge {
      position: absolute;
      top: 0; bottom: 0;
      width: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      cursor: pointer;
      transition: background 0.12s;
      z-index: 5;
    }
    .panel-edge-left { left: 0; border-right: 1px solid var(--border); }
    .panel-edge-right { right: 0; border-left: 1px solid var(--border); }
    .panel-edge:hover { background: var(--green-bg); }
    .panel-edge-arrow {
      color: var(--muted);
      font-size: 14px;
      user-select: none;
    }
    .panel-edge:hover .panel-edge-arrow { color: var(--green); }

    /* Collapsed: hide everything but the right edge strip (the reopen handle) */
    #info_panel.collapsed { width: 22px; padding: 0; }
    #info_panel.collapsed .panel-edge-left,
    #info_panel.collapsed .info-header,
    #info_panel.collapsed .boot-toggle,
    #info_panel.collapsed .info-body { display: none; }

    /* Boot-scope segmented toggle at the top of the panel */
    .boot-toggle {
      display: flex;
      gap: 0;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .boot-seg {
      flex: 1;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 4px 8px;
      transition: all 0.12s;
    }
    .boot-seg:first-child { border-radius: 4px 0 0 4px; border-right: none; }
    .boot-seg:last-child { border-radius: 0 4px 4px 0; }
    .boot-seg:hover { color: var(--text); }
    .boot-seg.active { background: var(--green-bg); color: var(--green); border-color: var(--green); }

    /* Resting caption shown before any data is parsed */
    .summary-resting {
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 28px 8px;
      line-height: 1.6;
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .info-tab {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 3px;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .info-tab.active { background: var(--green-bg); color: var(--green); }
    .info-tab:not(.active):hover { color: var(--text); }
    .info-tab-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      margin-left: 3px;
      vertical-align: middle;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .info-tab-dot.visible { opacity: 1; }
    #all_boots_wrap:hover { color: var(--text); }

    .info-body {
      flex: 1;
      overflow-y: scroll;   /* always-on scrollbar so it's clear it scrolls */
      overflow-x: hidden;   /* charts scale to fit; never scroll sideways */
      min-height: 0;
    }
    .info-body::-webkit-scrollbar { width: 12px; }
    .info-body::-webkit-scrollbar-track { background: var(--bg); }
    .info-body::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 6px;
      border: 2px solid var(--surface);
    }
    .info-body::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    .info-pane { padding: 10px 12px; }
    .info-pane[hidden] { display: none; }

    /* ── Common controls ── */
    label { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 4px; }

    select, input[type="number"], input[type="text"] {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }

    .btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--green); background: var(--green-bg); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #connect {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green);
      font-weight: 600;
    }
    #connect:hover { background: var(--green); color: #111827; }

    .btn-active {
      background: var(--green-bg) !important;
      color: var(--green) !important;
      border-color: var(--green) !important;
    }

    /* Level filter buttons */
    .level-btn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }
    .level-btn[data-level="D"].active { background: rgba(6,182,212,0.15);   color: #06b6d4; border-color: #06b6d4; }
    .level-btn[data-level="I"].active { background: rgba(103,234,148,0.15); color: #67EA94; border-color: #67EA94; }
    .level-btn[data-level="W"].active { background: rgba(245,158,11,0.15);  color: #f59e0b; border-color: #f59e0b; }
    .level-btn[data-level="E"].active { background: rgba(239,68,68,0.15);   color: #ef4444; border-color: #ef4444; }
    .level-btn[data-level="C"].active { background: rgba(220,38,38,0.2);    color: #dc2626; border-color: #dc2626; }

    .module-buttons { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .module-btn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }
    .module-btn.active { background: rgba(167,139,250,0.15); color: #a78bfa; border-color: #a78bfa; }
    #polyfill_switcher { color: var(--muted); font-size: 11px; text-decoration: none; }
    #polyfill_switcher:hover { color: var(--text); }
    .pii-eg { font-size: 10px; color: var(--muted); font-weight: 400; }

    /* ── Summary content (inside info sidebar) ── */
    [data-tooltip] { position: relative; cursor: help; }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 3px);
      left: 0;
      background: #1f2937;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      font-style: normal;
      font-weight: 400;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 280px;
      white-space: normal;
      line-height: 1.5;
    }
    [data-tooltip]:hover::after { opacity: 1; }
    #summaryContent {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .device-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin: 4px auto 10px;
      display: block;
      filter: drop-shadow(0 0 6px rgba(103,234,148,0.2));
      opacity: 0.9;
    }
    .sum-grid {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .sum-row {
      display: flex;
      gap: 8px;
      font-size: 11px;
      line-height: 1.65;
      min-width: 0;
      padding: 1px 0;
    }
    .sum-label {
      color: var(--muted);
      flex-shrink: 0;
      width: 76px;
      text-align: right;
      font-size: 10px;
      padding-top: 1px;
    }
    .sum-value { color: var(--text); min-width: 0; word-break: break-word; }
    .sum-value code {
      font-family: monospace;
      font-size: 10px;
      background: var(--surface2);
      padding: 1px 4px;
      border-radius: 3px;
    }
    .sum-tag {
      font-size: 10px;
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid rgba(103,234,148,0.3);
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 600;
    }
    .sum-warn { color: #f59e0b; font-weight: 600; }
    .sum-err  { color: #ef4444; font-weight: 600; }
    .sum-divider {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .sum-divider-err { color: #f87171; border-color: rgba(239,68,68,0.3); }

    /* ── Data plot content ── */
    #dataPlotContent { display: block; }
    .dp-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .dp-controls label {
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      gap: 4px;
    }
    .dp-controls input { cursor: pointer; accent-color: var(--green); }
    .dp-charts {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    /* Charts scale down to the pane width so the panel never scrolls sideways */
    .dp-charts .hc-section { max-width: 100%; min-width: 0; }
    .dp-charts .hc-section svg { max-width: 100%; height: auto; }
    .hc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .hc-range {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--muted);
      cursor: pointer;
    }
    .hc-range input { cursor: pointer; accent-color: var(--green); width: 11px; height: 11px; }

    /* Analysis mode: expand the info panel, shrink the serial log, tile the data.
       Gated on the panel actually being visible so closing it frees the terminal. */
    .workspace.analysis:has(#info_panel:not([hidden])) .term-wrap { flex: 0 0 340px; }
    .workspace.analysis:has(#info_panel:not([hidden])) #info_panel { flex: 1; width: auto; }
    .workspace.analysis .dp-charts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      align-items: start;
    }
    .workspace.analysis .dp-charts .dp-divider { grid-column: 1 / -1; }
    .workspace.analysis .dp-charts .hc-section {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .workspace.analysis .dp-charts .hc-section svg { width: 100%; height: auto; }

    /* ── Diagnosis panel ── */
    #diagnosisContent { display: flex; flex-direction: column; gap: 0; }
    .diag-group { margin-bottom: 10px; }
    .diag-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .diag-diag .diag-header { color: #c084fc; border-color: rgba(192,132,252,0.35); }
    .diag-crit .diag-header { color: #ef4444; border-color: rgba(239,68,68,0.35); }
    .diag-warn .diag-header { color: #f59e0b; border-color: rgba(245,158,11,0.35); }
    .diag-info .diag-header { color: #79c0ff; border-color: rgba(121,192,255,0.35); }
    .diag-item {
      padding: 4px 0 4px 7px;
      border-left: 2px solid transparent;
      margin-bottom: 2px;
    }
    .diag-diag .diag-item { border-left-color: rgba(192,132,252,0.55); }
    .diag-crit .diag-item { border-left-color: rgba(239,68,68,0.55); }
    .diag-warn .diag-item { border-left-color: rgba(245,158,11,0.55); }
    .diag-info .diag-item { border-left-color: rgba(121,192,255,0.55); }
    .diag-title { font-size: 11px; font-weight: 600; color: var(--text); }
    .diag-detail { font-size: 10px; color: var(--muted); margin-top: 1px; line-height: 1.45; }
    .diag-none { color: var(--muted); font-size: 11px; text-align: center; padding: 20px 0; }
    .hc-section { display: flex; flex-direction: column; gap: 4px; }
    .hc-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .hc-legend {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
    }
    .hc-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    /* Node-status text tile */
    .ns-tile { display: flex; flex-direction: column; gap: 3px; min-width: 160px; }
    .ns-row { display: flex; justify-content: space-between; gap: 10px; font-size: 11px; }
    .ns-k { color: var(--muted); }
    .ns-v { color: var(--text); font-weight: 600; text-align: right; }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid var(--border);
      gap: 4px;
      z-index: 10;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }
  </style>
</head>
<body>

  <!-- ── Row 1: title + view switch ── -->
  <div class="toolbar">
    <span class="title">Meshtastic</span>
    <span class="title-sub">Log Analyser</span>
    <div class="sep"></div>
    <div id="statusDot" title="Serial connection status"></div>
    <button class="view-tab view-tab-big active" data-view="serial">Live Serial</button>
    <button class="view-tab view-tab-big" data-view="file">📄 File</button>
  </div>

  <!-- ── Row 2: mode controls (swaps with the view) ── -->
  <div class="mode-bar">
    <span id="serial_controls" class="ctrl-group">
      <label for="ports">Port</label>
      <select id="ports">
        <option value="prompt">— select port —</option>
      </select>
      <button id="connect" class="btn">Connect</button>
      <button id="advanced_toggle" class="btn" style="font-size:11px">Advanced ▾</button>
      <span id="advanced" class="ctrl-group" hidden>
        <label for="baudrate">Baud
          <select id="baudrate">
            <option value="9600">9600</option>
            <option value="19200">19200</option>
            <option value="38400">38400</option>
            <option value="57600">57600</option>
            <option value="115200" selected>115200</option>
            <option value="230400">230400</option>
            <option value="460800">460800</option>
            <option value="921600">921600</option>
            <option value="custom">Custom…</option>
          </select>
        </label>
        <input id="custom_baudrate" type="number" min="1" placeholder="baud…" hidden style="width:90px">
        <label for="databits">Data bits
          <select id="databits">
            <option value="7">7</option>
            <option value="8" selected>8</option>
          </select>
        </label>
        <label for="parity">Parity
          <select id="parity">
            <option value="none" selected>None</option>
            <option value="even">Even</option>
            <option value="odd">Odd</option>
          </select>
        </label>
        <label for="stopbits">Stop bits
          <select id="stopbits">
            <option value="1" selected>1</option>
            <option value="2">2</option>
          </select>
        </label>
        <label><input id="rtscts" type="checkbox"> HW flow control</label>
      </span>
      <div class="sep"></div>
      <label><input id="reconnect" type="checkbox" checked> Reconnect</label>
      <label><input id="grab_next" type="checkbox"> Grab next</label>
      <span class="api-toggle">
        <span class="api-label">Web Serial API:</span>
        <strong id="api_current">Native</strong>
        <a id="polyfill_switcher" class="btn"></a>
      </span>
    </span>
    <span id="file_controls" class="ctrl-group" hidden>
      <button id="load_file_btn" class="btn">📂 Load file…</button>
      <span id="file_name" class="title-sub"></span>
      <span id="file_progress" class="file-progress" hidden>
        <span class="file-progress-bar"><span id="file_progress_fill"></span></span>
        <span id="file_progress_pct">0%</span>
      </span>
      <input id="file_input" type="file" hidden>
    </span>
  </div>

  <!-- ── Port history bar (auto-shown when ports are seen) ── -->
  <div class="port-bar" id="port_bar" hidden>
    <span class="port-bar-label">PORTS</span>
    <div id="port_chips"></div>
  </div>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <span class="filter-label">LEVEL</span>
    <button class="level-btn active" data-level="D">DBG</button>
    <button class="level-btn active" data-level="I">INF</button>
    <button class="level-btn active" data-level="W">WRN</button>
    <button class="level-btn active" data-level="E">ERR</button>
    <button class="level-btn active" data-level="C">CRT</button>
    <div class="sep"></div>
    <span class="filter-label">MODULE</span>
    <button id="module_all_none" class="module-btn active" title="Select all / none">±</button>
    <div id="module_buttons" class="module-buttons"></div>
    <div class="sep"></div>
    <button id="pii_toggle" class="btn" title="Redact node IDs, GPS coords and node names">🔒 PII: OFF <span class="pii-eg">lat=52.944 lon=-1.435</span></button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
      <button id="autoscroll" class="btn btn-active" title="Auto-scroll the log to the newest line">⤓ Autoscroll</button>
      <button id="jump_bottom" class="btn" title="Jump to the newest line">⮟ Bottom</button>
      <div class="sep"></div>
      <button id="save"  class="btn">⬇ Save</button>
      <button id="clear" class="btn">⬜ Clear</button>
    </div>
  </div>

  <!-- ── Workspace: terminal + info sidebar (side by side, terminal never resizes vertically) ── -->
  <div class="workspace">

    <!-- Drop zone overlays the whole workspace -->
    <div class="drop-overlay" id="drop_overlay">
      <div class="drop-hint">Drop log file to analyze</div>
    </div>

    <!-- Live serial terminal -->
    <div class="term-wrap" id="view_serial">
      <div id="terminal_serial"></div>
    </div>

    <!-- File analysis terminal (own session, no serial controls) -->
    <div class="term-wrap" id="view_file" hidden>
      <div id="terminal_file"></div>
    </div>

    <!-- Info sidebar: always visible; shows a resting caption until data arrives -->
    <div id="info_panel">
      <!-- Left edge: click to expand / collapse the analysis view -->
      <div id="panel_edge_left" class="panel-edge panel-edge-left" title="Expand / collapse analysis view">
        <span id="panel_edge_arrow" class="panel-edge-arrow">⟨</span>
      </div>
      <div class="info-header">
        <button class="info-tab active" data-panel="summary">SUMMARY</button>
        <button class="info-tab" data-panel="interest">INTEREST <span class="info-tab-dot" id="interest_dot"></span></button>
        <button class="info-tab" data-panel="data">DATA <span class="info-tab-dot" id="data_dot"></span></button>
        <button class="info-tab" data-panel="diagnosis">DIAG <span class="info-tab-dot" id="diagnosis_dot"></span></button>
      </div>
      <div class="boot-toggle" title="Scope of the stats below">
        <button id="boot_since" class="boot-seg active">Since last boot</button>
        <button id="boot_all" class="boot-seg">All logs</button>
      </div>
      <div class="info-body">
        <div id="panel_summary" class="info-pane">
          <div id="summaryContent"></div>
        </div>
        <div id="panel_interest" class="info-pane" hidden>
          <div id="interestContent"></div>
        </div>
        <div id="panel_data" class="info-pane" hidden>
          <div id="dataPlotContent"></div>
        </div>
        <div id="panel_diagnosis" class="info-pane" hidden>
          <div id="diagnosisContent"></div>
        </div>
      </div>
      <!-- Right edge: click to hide / show the panel -->
      <div id="panel_edge_right" class="panel-edge panel-edge-right" title="Hide panel">
        <span id="panel_edge_right_arrow" class="panel-edge-arrow">»</span>
      </div>
    </div>

  </div>

  <footer>
    Based on the <a href="https://github.com/meshtastic/firmware" target="_blank" rel="noopener">Meshtastic</a>
    source code &amp; <a href="https://github.com/GoogleChromeLabs/serial-terminal" target="_blank"
    rel="noopener">GoogleChromeLabs/serial-terminal</a>. Shared under the
    <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank" rel="noopener">GPL-3.0 licence</a>.
  </footer>

  <script type="module" src="/src/index.ts"></script>
</body>
</html>
